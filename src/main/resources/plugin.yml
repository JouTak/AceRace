name: ${NAME}
version: ${VERSION}
api-version: ${MINECRAFT_VERSION}
main: com.joutak.acerace.AceRacePlugin
description: 'Plugin for AceRace minigame'
authors: ['EnderDissa', 'Stunnerer', 's4dnex']
contributors: ['technosimp']
website: ${WEBSITE}

depend: ['Multiverse-Core']
libraries:
  - 'org.jetbrains.kotlin:kotlin-stdlib:${KOTLIN_VERSION}'

commands:
  ar:
    description: AceRace commands

permissions:
  acerace.admin:
    default: op
    description: Доступ ко всем командам плагина AceRace
    children:
      mv.bypass.gamemode.*: true
  acerace.spectator:
    default: op
    description: Доступ к команде /ar spectate для наблюдения за играми
    children:
      mv.bypass.gamemode.*: true
      minecraft.command.spectate: true